name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        BASE_URL: https://practicesoftwaretesting.com
        API_BASE_URL: https://api.practicesoftwaretesting.com
        TEST_CUSTOMER_EMAIL: ${{ secrets.TEST_CUSTOMER_EMAIL }}
        TEST_CUSTOMER_PASSWORD: ${{ secrets.TEST_CUSTOMER_PASSWORD }}
        TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
        TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        TEST_CUSTOMER2_EMAIL: ${{ secrets.TEST_CUSTOMER2_EMAIL }}
        TEST_CUSTOMER2_PASSWORD: ${{ secrets.TEST_CUSTOMER2_PASSWORD }}
        TEST_INVALID_EMAIL: ${{ secrets.TEST_INVALID_EMAIL }}
        TEST_INVALID_PASSWORD: ${{ secrets.TEST_INVALID_PASSWORD }}
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30